<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Payment Calculator</title>
  <link rel="canonical" href="https://carpaymentcalculator.app/" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #2c3e50; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 20px; background: #2980b9; color: #fff; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
    button:hover { background: #1a6ea8; }
    #result { margin-top: 20px; font-size: 1.2em; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    .cta:hover { background: #1e8449; }
    footer { margin-top: 40px; font-size: 0.9em; color: #555; }
  </style>
</head>
<body>
  <h1>Car Payment Calculator</h1>
  <p>Estimate your monthly car payment quickly and easily.</p>

  <label>Loan Amount ($)
    <input type="number" id="loan" placeholder="25000" />
  </label>
  <label>Annual Interest Rate (%)
    <input type="number" id="rate" placeholder="5.5" step="0.01" />
  </label>
  <label>Loan Term (months)
    <input type="number" id="term" placeholder="60" />
  </label>
  <button onclick="calculate()">Calculate</button>
  <div id="result"></div>

  <br />
  <a class="cta" href="https://carpaymentcalculator.app/">Car Payment Calculator</a>

  <footer>
    <p>For the full-featured tool, visit <a href="https://carpaymentcalculator.app/">Car Payment Calculator</a>.</p>
  </footer>

  <script>
    function calculate() {
      const P = parseFloat(document.getElementById('loan').value);
      const r = parseFloat(document.getElementById('rate').value) / 100 / 12;
      const n = parseInt(document.getElementById('term').value);
      if (!P || !r || !n) { document.getElementById('result').textContent = 'Please fill in all fields.'; return; }
      const payment = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
      document.getElementById('result').textContent = 'Monthly Payment: $' + payment.toFixed(2);
    }
  </script>
</body>
</html>
